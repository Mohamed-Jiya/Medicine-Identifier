<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medicine Identifier</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --green-dark:#14532d;
    --green-main:#1a6b3c;
    --green-light:#e8f5ee;

    --bg:#f4f7f5;
    --card:#ffffff;

    --text:#1f2937;
    --text-light:#6b7280;

    --border:#d9e6dd;

    --shadow:
    0 8px 28px rgba(0,0,0,0.08);

    --radius:18px;

}

body{

    font-family:'DM Sans',sans-serif;

    background:var(--bg);

    color:var(--text);

    display:flex;

    min-height:100vh;

}

/* SIDEBAR */

.sidebar{

    width:260px;

    background:
    linear-gradient(
    180deg,
    #14532d,
    #1a6b3c
    );

    padding:28px 18px;

    display:flex;

    flex-direction:column;

    gap:18px;

    position:fixed;

    height:100vh;

}

.logo{

    padding:10px 8px 22px;

    border-bottom:
    1px solid rgba(255,255,255,0.12);

}

.logo h1{

    font-size:28px;

    font-weight:800;

    line-height:1.1;

    background:
    linear-gradient(
    135deg,
    #ffffff,
    #c8ffd8
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    margin-top:8px;

}

.logo p{

    color:rgba(255,255,255,0.6);

    font-size:12px;

    margin-top:8px;

}

.nav-title{

    color:rgba(255,255,255,0.45);

    font-size:11px;

    text-transform:uppercase;

    letter-spacing:1px;

    margin-left:8px;

    margin-top:6px;

}

.nav-item{

    display:flex;

    align-items:center;

    gap:12px;

    padding:14px 16px;

    border-radius:14px;

    cursor:pointer;

    transition:0.25s;

    font-weight:600;

    color:rgba(255,255,255,0.82);

    background:rgba(255,255,255,0.05);

}

.nav-item:hover{

    transform:translateX(4px);

    background:rgba(255,255,255,0.14);

    color:#fff;

    box-shadow:
    0 8px 18px rgba(0,0,0,0.15);

}

.nav-item.active{

    background:
    linear-gradient(
    135deg,
    #2ecc71,
    #1a6b3c
    );

    color:#fff;

    box-shadow:
    0 10px 22px rgba(46,204,113,0.3);

}

/* MAIN */

.main{

    margin-left:260px;

    flex:1;

    padding:28px;

}

/* TOP */

.top-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:22px;

}

.top-bar h2{

    font-size:28px;

    font-weight:800;

    color:#1f2937;

}

.date-box{

    background:#fff;

    border:1px solid var(--border);

    padding:10px 18px;

    border-radius:30px;

    font-size:13px;

    color:var(--text-light);

    box-shadow:var(--shadow);

}

/* DASHBOARD */

.dashboard{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:18px;

    align-items:stretch;

}

/* CARDS */

.card{

    background:var(--card);

    border-radius:var(--radius);

    padding:24px;

    box-shadow:var(--shadow);

    border:1px solid var(--border);

    transition:0.25s;

    min-height:170px;

    display:flex;

    flex-direction:column;

    justify-content:center;

}

.card:hover{

    transform:translateY(-3px);

    box-shadow:
    0 18px 38px rgba(0,0,0,0.10);

}

.card-title{

    font-size:13px;

    color:var(--text-light);

    text-transform:uppercase;

    font-weight:700;

    margin-bottom:16px;

    letter-spacing:0.6px;

}

/* SEARCH */

.search-box{

    display:flex;

    gap:12px;

}

.search-input{

    flex:1;

    padding:15px 18px;

    border-radius:12px;

    border:1.5px solid var(--border);

    outline:none;

    font-size:15px;

    transition:0.2s;

    background:#fafdfb;

}

.search-input:focus{

    border-color:var(--green-main);

    box-shadow:
    0 0 0 4px rgba(46,204,113,0.12);

}

/* BUTTON */

.btn{

    border:none;

    border-radius:12px;

    padding:15px 22px;

    font-size:14px;

    font-weight:700;

    cursor:pointer;

    transition:0.22s;

}

.btn-green{

    background:
    linear-gradient(
    135deg,
    #1a6b3c,
    #2ecc71
    );

    color:#fff;

}

.btn-green:hover{

    transform:scale(1.03);

    box-shadow:
    0 10px 22px rgba(46,204,113,0.25);

}

/* UPLOAD */

.upload-box{

    height:100%;

    min-height:155px;

    border:2px dashed #cde5d6;

    border-radius:16px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    position:relative;

    overflow:hidden;

    transition:0.25s;

    background:#fbfefc;

}

.upload-box:hover{

    background:var(--green-light);

    border-color:var(--green-main);

}

.upload-box input{

    position:absolute;

    inset:0;

    opacity:0;

    cursor:pointer;

}

.upload-box h3{

    font-size:17px;

    margin-top:10px;

}

.upload-box p{

    color:var(--text-light);

    font-size:13px;

    margin-top:6px;

}

/* RESULT */

#result-area{

    margin-top:24px;

}

.result-card{

    overflow:hidden;

}

.result-image{

    background:#f7faf8;

    padding:22px;

    text-align:center;

    border-bottom:1px solid #edf3ef;

}

.result-image img{

    width:220px;

    max-width:100%;

    border-radius:16px;

    box-shadow:
    0 10px 28px rgba(0,0,0,0.12);

}

.result-header{

    padding:22px;

    background:
    linear-gradient(
    135deg,
    #14532d,
    #1a6b3c
    );

    color:#fff;

}

.result-header h2{

    font-size:26px;

    font-weight:800;

}

.result-header p{

    opacity:0.82;

    margin-top:6px;

}

.status{

    display:inline-block;

    margin-top:12px;

    padding:6px 14px;

    border-radius:20px;

    background:rgba(255,255,255,0.14);

    font-size:12px;

    font-weight:700;

}

.result-body{

    padding:20px 24px;

}

.result-row{

    display:flex;

    padding:14px 0;

    border-bottom:1px solid #edf2ee;

}

.result-row:last-child{

    border:none;

}

.result-label{

    width:130px;

    font-size:12px;

    font-weight:700;

    color:var(--text-light);

    text-transform:uppercase;

}

.result-value{

    flex:1;

    font-size:14px;

    font-weight:500;

}

/* HISTORY */

.history{

    margin-top:22px;

}

.history-items{

    display:none;

    flex-wrap:wrap;

    gap:10px;

    margin-top:14px;

}

.history-pill{

    padding:10px 16px;

    border-radius:999px;

    background:#fff;

    border:1px solid var(--border);

    font-size:13px;

    font-weight:600;

    cursor:pointer;

    transition:0.2s;

}

.history-pill:hover{

    background:var(--green-light);

    transform:translateY(-2px);

}

/* PLACEHOLDER */

.placeholder{

    text-align:center;

    padding:70px 24px;

    color:var(--text-light);

}

.placeholder span{

    font-size:50px;

    display:block;

    margin-bottom:14px;

}

/* MOBILE */

@media(max-width:900px){

    .dashboard{

        grid-template-columns:1fr;

    }

}

@media(max-width:768px){

    body{

        flex-direction:column;

    }

    .sidebar{

        width:100%;

        height:auto;

        position:relative;

        flex-direction:row;

        flex-wrap:wrap;

        justify-content:center;

    }

    .main{

        margin-left:0;

        padding:18px;

    }

    .top-bar{

        flex-direction:column;

        gap:14px;

        align-items:flex-start;

    }

    .search-box{

        flex-direction:column;

    }

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

<div style="font-size:36px;">🩺</div>

<h1>
Medicine<br>
Identifier
</h1>

<p>
AI Powered Medicine Detection System
</p>

</div>

<div class="nav-title">Navigation</div>

<div class="nav-item active" onclick="scrollToTopSection()">
🔍 Search
</div>

<div class="nav-item" onclick="scrollToUpload()">
📷 Upload
</div>

<div class="nav-item" onclick="scrollToHistory()">
🕘 History
</div>

<div class="nav-item" onclick="scrollToInventory()">
📦 Inventory
</div>

</div>

<div class="main">

<div class="top-bar">

<h2>
Medicine Dashboard
</h2>

<div class="date-box" id="date-box"></div>

</div>

<div class="dashboard">

<div class="card">

<div class="card-title">
Search Medicine
</div>

<div class="search-box">

<input
type="text"
class="search-input"
id="search-input"
placeholder="Enter medicine name...">

<button
class="btn btn-green"
onclick="doSearch()">

Search

</button>

</div>

</div>

<div class="card">

<div class="card-title">
Upload Medicine Image
</div>

<div class="upload-box">

<div style="font-size:42px;">📷</div>

<h3>
Upload Medicine Image
</h3>

<p>
Click or drag image here
</p>

<input
type="file"
accept="image/*"
onchange="handleFile(this)">

</div>

</div>

</div>

<div id="result-area">

<div class="card placeholder">

<span>💊</span>

Search medicine or upload image to see results.

</div>

</div>

<div class="card history">

<div
class="card-title"
style="
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
"
onclick="toggleHistory()">

<span>Recent Searches</span>

<span id="history-arrow">▼</span>

</div>

<div
class="history-items"
id="history-items">

</div>

</div>

</div>

<script>

document.getElementById('date-box')
.innerText =
new Date().toLocaleDateString();

function scrollToTopSection(){

window.scrollTo({
top:0,
behavior:'smooth'
});

}

function scrollToUpload(){

document.querySelector('.upload-box')
.scrollIntoView({
behavior:'smooth'
});

}

function scrollToHistory(){

document.querySelector('.history')
.scrollIntoView({
behavior:'smooth'
});

}

function scrollToInventory(){

alert('Inventory section coming soon 🔥');

}

function doSearch(){

const query =
document.getElementById('search-input')
.value.trim();

if(!query)return;

document.getElementById('result-area')
.innerHTML = `

<div class="card placeholder">

<span>⏳</span>

Searching medicine...

</div>`;

fetch('/search',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
name:query
})

})

.then(res=>res.json())

.then(data=>{

if(data.error){

document.getElementById('result-area')
.innerHTML = `

<div class="card placeholder">

<span>⚠️</span>

${data.error}

</div>`;

return;

}

saveHistory(data.name);

showResult(data);

});

}

function handleFile(input){

if(!input.files[0])return;

const file =
input.files[0];

const imageURL =
URL.createObjectURL(file);

const formData =
new FormData();

formData.append('image',file);

document.getElementById('result-area')
.innerHTML = `

<div class="card placeholder">

<span>📷</span>

Scanning image...

</div>`;

fetch('/identify',{

method:'POST',

body:formData

})

.then(res=>res.json())

.then(data=>{

if(data.error){

document.getElementById('result-area')
.innerHTML = `

<div class="card placeholder">

<span>⚠️</span>

${data.error}

</div>`;

return;

}

saveHistory(data.name);

showResult(data,imageURL);

});

}

function showResult(data,imageURL=null){

document.getElementById('result-area')
.innerHTML = `

<div class="card result-card">

${imageURL ? `

<div class="result-image">

<img src="${imageURL}">

</div>

` : ''}

<div class="result-header">

<h2>
💊 ${data.name}
</h2>

<p>
Medicine Details
</p>

<div class="status">
SAFE ✅
</div>

</div>

<div class="result-body">

<div class="result-row">
<div class="result-label">Strength</div>
<div class="result-value">${data.strength || '500mg'}</div>
</div>

<div class="result-row">
<div class="result-label">Uses</div>
<div class="result-value">${data.use}</div>
</div>

<div class="result-row">
<div class="result-label">Dosage</div>
<div class="result-value">${data.dosage}</div>
</div>

<div class="result-row">
<div class="result-label">Side Effects</div>
<div class="result-value">${data.side_effect}</div>
</div>

<div class="result-row">
<div class="result-label">Expiry</div>
<div class="result-value">${data.expiry || 'Not Available'}</div>
</div>

</div>

</div>`;

}

function saveHistory(name){

let history =
JSON.parse(
localStorage.getItem('medicineHistory')
) || [];

history =
history.filter(item=>item!==name);

history.unshift(name);

history =
history.slice(0,6);

localStorage.setItem(
'medicineHistory',
JSON.stringify(history)
);

renderHistory();

}

function renderHistory(){

const container =
document.getElementById('history-items');

const history =
JSON.parse(
localStorage.getItem('medicineHistory')
) || [];

container.innerHTML='';

history.forEach(item=>{

container.innerHTML += `

<div
class="history-pill"
onclick="fillSearch('${item}')">

💊 ${item}

</div>`;

});

}

function fillSearch(name){

document.getElementById('search-input')
.value = name;

doSearch();

}

function toggleHistory(){

const history =
document.getElementById('history-items');

const arrow =
document.getElementById('history-arrow');

if(history.style.display === 'none' || history.style.display === ''){

history.style.display='flex';

arrow.innerHTML='▲';

}

else{

history.style.display='none';

arrow.innerHTML='▼';

}

}

window.onload = ()=>{

renderHistory();

};

</script>

</body>

</html>
